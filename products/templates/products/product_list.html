<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products List</title>
</head>
<body>
    <section>
        <h1>List of Products</h1>

        
        <form action="" method="get">
            <a href="{% url 'products:product_list' %}" class="btn btn-secondary">Reset Filters</a>
            
            <input type="text" name="search" placeholder="Search all Products..." value="{{ search_query }}">
            
            <select name="category">
                <option value=''>All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.id }}"
                        {% comment %} category.id is an int, so we have to normalize to str {% endcomment %}
                        {% if selected_category == category.id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>

            <div>
                <p>Tags:</p>

                {% for tag in tags %}
                    <label>
                        <input
                            type="checkbox"
                            name="tags"
                            value="{{ tag.id }}"
                            {% if tag.id in selected_tags %}
                                checked
                            {% endif %}
                        >
                        {{ tag.name }}
                    </label>
                    <br>
                {% endfor %}
            </div>

            <button type="submit">Search</button>
        </form>

        {% comment %} use data from view to populate page {% endcomment %}
        <ul>
            {% if products %}
                {% for product in products %}
                    <li>{{ product.name }}</li>
                {% endfor %}
            {% else %}
                <p>No products found.</p>
            {% endif %}
            
        </ul>
    </section>
</body>
</html>
